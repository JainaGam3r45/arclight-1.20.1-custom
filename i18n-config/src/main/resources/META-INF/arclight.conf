_v = 1

locale {
  fallback = "zh_cn"
}
optimization {
  # Paper-lite / Spigot knobs. Starlight, ModernFix and Krypton (as Forge mods) already cover
  # most "modern Paper" lighting, general and network opts — do not re-enable those here.
  # Also tune: spigot.yml (entity-activation-range, entity-tracking-range, ticks-per.hopper-*,
  # hopper-amount, hopper-can-load-chunks, nerf-spawner-mobs, merge-radius.*, mob-spawn-range,
  # view-distance, simulation-distance) and bukkit.yml (spawn-limits, ticks-per.*-spawns).
  # Prefer lower simulation-distance than view-distance under lag; avoid keep-spawn-loaded on
  # empty Multiverse worlds. Arclight already applies per-world view/simulation from Spigot.
  # optimization.spawn = natural mob gen budget; optimization.chunks = load/gen/send budget.
  cache-plugin-class = true
  disable-data-fixer = false
  goal-selector-update-interval = 2
  use-activation-and-tracking-range = true
  max-entity-collisions = 8
  quiet-startup = true
  spawn {
    enabled = true
    skip-when-mspt-above = 45.0
    max-chunks-per-tick = 64
    max-ms-per-tick = 10.0
    per-player-mob-spawns = true
    use-mob-spawn-range = true
    relaxed-when-players-at-most = 2
    relaxed-when-mspt-below = 30.0
    local-mob-cap-scale = 1.0
    local-mob-cap {
      monster = -1
      creature = -1
      ambient = -1
      axolotls = -1
      underground_water_creature = -1
      water_creature = -1
      water_ambient = -1
    }
  }
  # Chunk budget: soft-defers non-blocking load/gen under MSPT pressure; always flushes before sync getChunk.
  # Never gates MainThreadExecutor.pollTask (Watchdog-safe). Prefer lowering view/simulation-distance in spigot.yml.
  chunks {
    enabled = true
    skip-gen-when-mspt-above = 45.0
    max-chunk-loads-per-tick = 24
    max-chunk-gens-per-tick = 4
    max-chunk-sends-per-tick = 48
    max-ms-per-tick = 4.0
  }
}
compatibility {
  material-property-overrides {
  }
  entity-property-overrides {
  }
  symlink-world = false
  extra-logic-worlds = [
    "com.example.mod.ExtraLogicWorld",
    "xyz.nucleoid.fantasy.RuntimeWorld"
  ]
  forward-permission = true
  valid-username-regex = ""
  lenient-item-tag-match = true
  isolate-plugin-class-loaders = [
    "com.example.mod.package.aaaa"
  ]
  isolate-adventure-from-modloader = false
}
proxies {
  velocity {
    enabled = false
    online-mode = true
    secret = ""
  }
}
async-catcher {
  dump = true
  warn = true
  defaultOperation = block
  overrides {
  }
  log-overrides {
    "chunk entity get" = DEBUG
  }
}
