comments {
  _v.comment = [
    "Repository: https://github.com/IzzelAliz/Arclight"
    "Issue Tracker: https://github.com/IzzelAliz/Arclight/issues"
    ""
    "Config version number, do not edit."
  ]
  locale {
    comment = "Language and translation settings."
    current.comment = "Active locale code (for example en_us). Usually set from the system locale."
    fallback.comment = "Locale used when a string is missing from the current language pack."
  }
  optimization {
    comment = [
      "Paper-lite and Spigot-era performance knobs."
      "Prefer Starlight, ModernFix, and Krypton for lighting and networking on hybrid stacks."
      "Also tune spigot.yml and bukkit.yml for activation ranges, hoppers, and spawn limits."
    ]
    cache-plugin-class.comment = "Cache remapped plugin classes so plugins load faster after the first time."
    disable-data-fixer.comment = [
      "Skip DataFixerUpper to save memory and speed up world load."
      "Do not use in production — risk of data loss or corruption."
    ]
    goal-selector-update-interval.comment = [
      "How often (in ticks) mob AI goals are refreshed."
      "Higher values use less CPU; mobs change goals less often."
    ]
    use-activation-and-tracking-range.comment = "Use Spigot activation range and entity tracking range optimizations."
    max-entity-collisions.comment = [
      "Max entity-entity push collisions resolved per living entity per tick."
      "Default 8 matches classic Spigot; 0 or less disables push collisions."
    ]
    quiet-startup.comment = [
      "Collapse noisy per-registry startup lines into a single summary."
      "Detailed counts remain available at DEBUG."
    ]
    spawn {
      comment = [
        "Budget for natural mob spawning on the main thread so TPS stays stable under load."
        "Does not replace bukkit.yml spawn-limits. Spawner blocks are not budgeted."
      ]
      enabled.comment = "Turn natural spawn budgeting on or off."
      skip-when-mspt-above.comment = "Skip natural spawns this tick when average MSPT is at or above this value."
      max-chunks-per-tick.comment = "Max chunks that may run natural spawning per world per tick."
      max-ms-per-tick.comment = "Soft time budget in milliseconds for natural spawn work each tick."
      per-player-mob-spawns.comment = [
        "Limit mob density near each player while bukkit.yml spawn-limits stay the world ceiling."
        "Stops one farm from eating the entire world mob cap."
      ]
      use-mob-spawn-range.comment = "Honor spigot.yml mob-spawn-range when picking chunks for natural spawn."
      relaxed-when-players-at-most.comment = "With this many players or fewer (and low MSPT), skip max-chunks and max-ms caps."
      relaxed-when-mspt-below.comment = "MSPT must be below this value for the relaxed low-population spawn mode."
      local-mob-cap-scale.comment = [
        "Scales vanilla local mob density per player area (monsters are about 70 at 1.0)."
        "bukkit.yml spawn-limits stay the world ceiling. Example: 3.0 ≈ 210 local monsters."
        "Edit the live arclight.yml — jar defaults do not overwrite your values."
      ]
      local-mob-cap {
        comment = [
          "Absolute local caps per category. -1 means use vanilla max times local-mob-cap-scale."
          "Example: monster = 200 caps local hostiles at 200 regardless of scale."
        ]
        monster.comment = "Local cap for monsters. -1 uses the scaled vanilla default."
        creature.comment = "Local cap for animals. -1 uses the scaled vanilla default."
        ambient.comment = "Local cap for ambient mobs. -1 uses the scaled vanilla default."
        axolotls.comment = "Local cap for axolotls. -1 uses the scaled vanilla default."
        underground_water_creature.comment = "Local cap for underground water creatures. -1 uses the scaled vanilla default."
        water_creature.comment = "Local cap for water creatures. -1 uses the scaled vanilla default."
        water_ambient.comment = "Local cap for water ambient mobs. -1 uses the scaled vanilla default."
      }
    }
    chunks {
      comment = [
        "Budget for chunk load, generate, and send work so exploring or teleporting does not spike TPS."
        "Never blocks the main-thread task poller. Sync getChunk still forces progress when needed."
      ]
      enabled.comment = "Turn chunk workload budgeting on or off."
      skip-gen-when-mspt-above.comment = "Defer new worldgen this tick when average MSPT is at or above this value."
      max-chunk-loads-per-tick.comment = "Max non-blocking chunk load promotions per server tick."
      max-chunk-gens-per-tick.comment = "Max non-blocking worldgen promotions per server tick."
      max-chunk-sends-per-tick.comment = "Max chunk packets sent to players per server tick."
      max-ms-per-tick.comment = "Soft time budget in milliseconds for budgeted chunk work each tick."
    }
  }
  async-catcher {
    comment = [
      "What to do when plugin or mod code touches the world off the main thread."
      "Modes: none, dispatch, block (recommended), exception."
    ]
    dump.comment = "Write a stack trace to debug.log when the async catcher trips."
    warn.comment = "Log a warning when off-thread access is detected."
    defaultOperation.comment = "Default action for unlisted async access: none, dispatch, block, or exception."
    overrides.comment = "Per-call-site overrides for the default async-catcher operation."
    log-overrides.comment = "Per-call-site log levels for async-catcher messages (for example DEBUG)."
  }
  compatibility {
    comment = "Compatibility knobs for plugins, mods, and hybrid edge cases."
    material-property-overrides.comment = "Optional overrides for material properties used by Bukkit material bridges."
    entity-property-overrides.comment = "Optional overrides for entity properties used by Bukkit entity bridges."
    symlink-world.comment = [
      "Create symlinks so mod dimension folders match Bukkit world names."
      "Improves plugin compatibility; changing this on a live server can rename mod worlds."
    ]
    extra-logic-worlds.comment = [
      "Extra world classes that should run full game logic."
      "If a mod misbehaves, search logs for [EXT_LOGIC] and add the class name here."
    ]
    forward-permission.comment = [
      "true forwards Forge permission checks to Bukkit."
      "false disables forwarding. reverse sends Bukkit player checks to Forge."
    ]
    valid-username-regex.comment = [
      "Regex for valid usernames. Leave blank to use vanilla rules."
      "Example for any name: .+"
    ]
    lenient-item-tag-match.comment = "Allow empty-NBT items to stack with items that have no tag."
    isolate-plugin-class-loaders.comment = [
      "Package prefixes that must not be loaded via illegal cross-plugin access."
      "Useful for classloading conflicts; may break plugins that rely on that access."
    ]
    isolate-adventure-from-modloader.comment = "Stop plugins from loading Kyori Adventure from the mod loader."
  }
  proxies {
    comment = "Proxy forwarding settings (Velocity modern forwarding)."
    velocity {
      comment = "Velocity modern player-info forwarding (HMAC secret)."
      enabled.comment = [
        "Enable modern forwarding. Backend online-mode must be false."
        "Keep settings.bungeecord=false in spigot.yml."
      ]
      online-mode.comment = "Whether the Velocity proxy itself is in online-mode. Match velocity.toml."
      secret.comment = [
        "Shared secret; must match Velocity forwarding.secret."
        "Required when velocity.enabled is true."
      ]
    }
  }
  performance-bars {
    comment = "Boss bars that show live TPS/MSPT or RAM usage to ops who enable them."
    tpsbar {
      comment = "Settings for the /tpsbar display."
      title.comment = "Text on the TPS bar. Placeholders: <tps>, <mspt>, <ping>."
      overlay.comment = "Boss bar style overlay (for example NOTCHED_20)."
      fill-mode.comment = "What drives the bar fill: MSPT or similar fill modes."
      progress-color {
        comment = "Boss bar colors for good, medium, and low performance."
        good.comment = "Color when performance looks healthy."
        medium.comment = "Color when performance is middling."
        low.comment = "Color when performance is poor."
      }
      text-color {
        comment = "Text color formats for good, medium, and low states. Use <text> as the placeholder."
        good.comment = "Format for healthy metric text."
        medium.comment = "Format for middling metric text."
        low.comment = "Format for poor metric text."
      }
      tick-interval.comment = "How often the bar refreshes, in ticks."
    }
    rambar {
      comment = "Settings for the /rambar display."
      title.comment = "Text on the RAM bar. Placeholders: <used>, <xmx>, <percent>."
      overlay.comment = "Boss bar style overlay (for example NOTCHED_20)."
      fill-mode.comment = "What drives the bar fill."
      progress-color {
        comment = "Boss bar colors for good, medium, and low memory pressure."
        good.comment = "Color when memory usage looks healthy."
        medium.comment = "Color when memory usage is middling."
        low.comment = "Color when memory usage is high."
      }
      text-color {
        comment = "Text color formats for good, medium, and low states. Use <text> as the placeholder."
        good.comment = "Format for healthy metric text."
        medium.comment = "Format for middling metric text."
        low.comment = "Format for poor metric text."
      }
      tick-interval.comment = "How often the bar refreshes, in ticks."
    }
    player-state.comment = "Persisted per-player toggle state for visible bars. Managed by commands; usually leave alone."
  }
  drop {
    comment = "Settings for the /drop event (fair chest race for players)."
    safe-search-radius.comment = "How far (in blocks) to search for a safe chest location around players."
    distance-milestones.comment = "Distances that trigger nearby announcements as players approach the drop."
    bossbar {
      comment = "Boss bar shown while a drop is active."
      title.comment = "Boss bar title. Placeholders: <x>, <y>, <z>."
      color.comment = "Boss bar color name (for example YELLOW)."
      overlay.comment = "Boss bar style overlay (for example NOTCHED_20)."
    }
    messages {
      comment = "Chat messages for drop lifecycle events. Support color codes with &."
      prepared.comment = "Lines sent when a drop chest has been prepared."
      started.comment = "Lines sent when the drop race starts."
      nearby.comment = "Lines sent when a player crosses a distance milestone."
      first-opened.comment = "Lines sent when someone opens the drop chest first."
      reclaimed-after-leave.comment = "Lines sent when the drop is reclaimed after the opener leaves."
      finished.comment = "Lines sent when the drop chest is emptied."
      cancelled.comment = "Lines sent when the drop is cancelled."
    }
  }
  drop-state.comment = "Runtime state for an active or pending drop. Managed automatically; usually leave alone."
}

