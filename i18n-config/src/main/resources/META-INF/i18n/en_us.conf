comments {
  _v.comment = [
    "Repository: https://github.com/IzzelAliz/Arclight"
    "Issue Tracker: https://github.com/IzzelAliz/Arclight/issues"
    ""
    ""
    "Config version number, do not edit."
  ]
  locale.comment = "Language/I18n settings"
  optimization {
    comment = [
      "Optimization related settings (Paper-lite / Spigot-era)"
      "On hybrid stacks, Starlight / ModernFix / Krypton already cover most modern Paper lighting,"
      "general and network optimizations — prefer those mods over reimplementing them in Arclight."
      "Also see spigot.yml (activation/tracking ranges, hopper ticks, merge radius, nerf-spawner-mobs)"
      "and bukkit.yml (spawn-limits, ticks-per.* spawns)."
    ]
    cache-plugin-class.comment = "Cache remapped plugin classes to speed up plugin class loading"
    disable-data-fixer.comment = [
      "Disable DataFixerUpper used for world/data upgrades"
      "Can speed up startup and world load and save roughly 80-200MB of memory"
      "Arclight and its developers are not responsible for any data loss or corruption"
      "Do NOT use in production"
    ]
    goal-selector-update-interval.comment = [
      "Interval in ticks to update the goal selector"
      "Higher values costs less resources"
      "Cause mobs changing their goals less often"
    ]
    use-activation-and-tracking-range.comment = "Whether to use Spigot Activation Range and Tracking Range optimization"
    max-entity-collisions.comment = [
      "Max entity-entity push collisions resolved per living entity per tick (Spigot/Paper-style)"
      "Default 8 matches classic Spigot; <= 0 disables entity push collisions"
      "Respects Bukkit LivingEntity#setCollidable and collidable exemptions"
    ]
    quiet-startup.comment = [
      "Collapse per-registry startup INFO lines into a single summary"
      "Detailed registry counts remain available at DEBUG"
    ]
    spawn {
      comment = [
        "Natural mob generation budget (main thread). Protects TPS under load."
        "Does not Folia-split worlds. Spawner blocks are not budgeted in v1."
        "Also set spigot.yml mob-spawn-range when use-mob-spawn-range is true."
      ]
      enabled.comment = "Enable EntityGenerationManager spawn budgeting"
      skip-when-mspt-above.comment = "Skip all natural spawnForChunk work this tick when average MSPT is at or above this value"
      max-chunks-per-tick.comment = "Max chunks that may run NaturalSpawner.spawnForChunk per world per tick"
      max-ms-per-tick.comment = "Soft time budget in milliseconds for natural spawn work per world tick"
      per-player-mob-spawns.comment = [
        "Paper-lite: use LocalMobCapCalculator only (no shared global Bukkit density pool)"
        "Reduces one farm eating the whole world mob cap"
      ]
      use-mob-spawn-range.comment = "Honor spigot.yml mob-spawn-range when choosing chunks for natural spawn"
    }
  }
  async-catcher.comment = [
    "Async Catcher related settings"
    "There are four modes, and BLOCK is recommended"
    "NONE - Do nothing"
    "DISPATCH - Non blocking-ly dispatch action to main thread"
    "BLOCK - Run in main thread and wait for results"
    "EXCEPTION - Raise an error"
  ]
  async-catcher.dump.comment = "Dump stack trace information in debug.log"
  compatibility {
    symlink-world.comment = [
      "Create symbol links to mod dimension folder that matches Bukkit world name"
      "Enable this could improve plugin compatibility"
      "Changing this on production server will cause changes to mod world names"
      "  and cause data loss on plugins relying world names"
      "See https://github.com/IzzelAliz/Arclight/wiki/World-Symlink for more detail"
    ]
    extra-logic-worlds.comment = [
      "Extra worlds running logic"
      "If any mods do not function well, try search class names in logs related to [EXT_LOGIC] and add them here"
    ]
    forward-permission.comment = [
      "true - Forward Forge permission query to Bukkit"
      "false - Disable permission forward"
      "reverse - Forward Bukkit player permission query to Forge"
    ]
    valid-username-regex.comment = [
      "Regex for valid username check. Leave it blank will fallback to vanilla check"
      "Following allows Chinese characters:"
      "valid-username-regex = \"^[ -~\\\\p{sc=Han}]{1,16}$\""
      "Following allows any username to login:"
      "valid-username-regex = \".+\""
    ]
    lenient-item-tag-match.comment = [
      "Allows items with an empty nbt tag stack on no tag items"
    ]
    isolate-plugin-class-loaders.comment = [
      "An illegal access means that a plugin loads a class from another plugin that is not a depend or soft-depend of itself"
      "When a package name is given, no illegal access will be attempted on classes prefixed with the package name."
      "This is especially useful when class loading issues happen."
      "Beware that it may break plugins relying on illegal access."
    ]
    isolate-adventure-from-modloader.comment = [
      "Prevent plugins from loading Kyori Adventure from ModLoader."
      "This is only an compatibility option and persists for now. Will be replaced with a better mechanism."
    ]
  }
}
