comments {
  _v.comment = [
    "源代码仓库: https://github.com/IzzelAliz/Arclight"
    "提交反馈/错误报告: https://github.com/IzzelAliz/Arclight/issues"
    ""
    ""
    "配置文件版本号，请勿编辑"
  ]
  locale.comment = "语言/国际化相关设置"
  optimization {
    comment = [
      "服务端优化相关设置（Paper-lite / Spigot）"
      "混合端上 Starlight / ModernFix / Krypton 已覆盖大部分现代 Paper 光照、通用与网络优化，请优先使用这些模组。"
      "另见 spigot.yml（激活/跟踪范围、漏斗刻、合并半径等）与 bukkit.yml（刷怪上限、ticks-per.*）。"
    ]
    cache-plugin-class.comment = "缓存重映射后的插件类以加速插件类加载"
    disable-data-fixer.comment = [
      "关闭用于升级存档数据的 DataFixerUpper 系统"
      "这将可能加快启动速度和地图加载速度，并减少 80-200mb 的内存占用"
      "Arclight 及其开发者不对任何数据丢失或损害负责"
      "请不要在生产环境中使用"
    ]
    goal-selector-update-interval.comment = [
      "实体目标选择器的更新间隔"
      "数值越高消耗资源越少"
      "导致实体更改目标速度变慢"
    ]
    use-activation-and-tracking-range.comment = "是否使用Spigot Activation Range和Tracking Range优化"
    max-entity-collisions.comment = [
      "每个生物每 tick 最多处理的实体互推碰撞次数（Spigot/Paper 风格）"
      "默认 8 与经典 Spigot 一致；<= 0 关闭实体互推"
      "遵守 Bukkit LivingEntity#setCollidable 与豁免列表"
    ]
    quiet-startup.comment = [
      "将各注册表的启动 INFO 合并为一条摘要"
      "详细注册数量仍可在 DEBUG 级别查看"
    ]
    spawn {
      comment = [
        "自然刷怪生成预算（主线程），在高负载下保护 TPS"
        "限制每 tick 的 spawnForChunk 次数；不替代 bukkit.yml 的 spawn-limits"
        "洞窟几乎不刷怪时请检查：难度非和平、doMobSpawning=true、"
        "spigot.yml mob-spawn-range >= 6（use-mob-spawn-range 时勿为 0）、可用 enabled=false 做 A/B"
        "方块刷怪笼不计入预算；不会像 Folia 那样分区世界"
      ]
      enabled.comment = "启用 EntityGenerationManager 刷怪预算"
      skip-when-mspt-above.comment = "平均 MSPT 达到或超过该值时跳过本 tick 的自然 spawnForChunk"
      max-chunks-per-tick.comment = "每个世界每 tick 最多对多少个区块执行 spawnForChunk（默认 64）"
      max-ms-per-tick.comment = "仅统计 spawnForChunk 本身的软时间预算（毫秒），不含 tickChunks 准备阶段"
      per-player-mob-spawns.comment = [
        "Paper-lite：LocalMobCapCalculator 控制局部密度，并以 bukkit.yml spawn-limits 作为世界总上限"
        "减轻单刷怪塔吃掉全图上限，同时仍尊重管理员设置的高上限"
      ]
      use-mob-spawn-range.comment = "自然刷怪选区块时遵守 spigot.yml 的 mob-spawn-range（为 0 则无自然刷怪）"
      relaxed-when-players-at-most.comment = "在线人数不超过该值且 MSPT 较低时，不应用 max-chunks/max-ms 上限（仍遵守 skip-when-mspt-above 与 mob-spawn-range）"
      relaxed-when-mspt-below.comment = "MSPT 必须低于该值才会启用单人/低人数的 relaxed 刷怪预算"
      local-mob-cap-scale.comment = [
        "按类别缩放 LocalMobCapCalculator 的原版局部上限（1.0 时怪物约 70）"
        "bukkit.yml 的 spawn-limits 仍是世界总上限；此项只改变局部密度"
        "例如 3.0 ≈ 210 局部怪物。请编辑服务器上的 arclight.conf（JAR 默认值不会覆盖）"
      ]
      local-mob-cap.comment = [
        "各类别绝对局部上限；-1 表示使用 vanillaMax * local-mob-cap-scale"
        "例如 monster = 200 将局部敌对生物上限设为 200，与 scale 无关"
      ]
    }
    chunks {
      comment = [
        "主线程区块加载 / 生成 / 发送预算，在探索或传送时保护 TPS"
        "在压力下软推迟非阻塞的 scheduleChunkGeneration；同步 getChunk 会先 flush 再等待"
        "绝不限制 MainThreadExecutor.pollTask（否则会触发 ServerWatchdog 死锁）"
        "请同时调整 spigot.yml 的 view-distance 与 simulation-distance"
        "空的 Multiverse 世界请避免 keep-spawn-loaded。可用 /chunkcap 查看队列"
      ]
      enabled.comment = "启用 ChunkWorkloadManager 预算"
      skip-gen-when-mspt-above.comment = "平均 MSPT 达到或超过该值时推迟本 tick 的 worldgen 调度（同步 getChunk 仍会强制推进）"
      max-chunk-loads-per-tick.comment = "每 tick 非阻塞 load/轻量晋级上限（同步路径不受此上限限制）"
      max-chunk-gens-per-tick.comment = "每 tick 非阻塞 worldgen 晋级上限（同步路径不受此上限限制）"
      max-chunk-sends-per-tick.comment = "每个服务器 tick 最多向玩家发送的区块+光照包数量（平滑传送/加入洪峰）"
      max-ms-per-tick.comment = "每个服务器 tick 预算内区块工作的软时间上限（毫秒）"
    }
  }
  async-catcher.comment = [
    "异步捕获相关设置"
    "Async Catcher 共有四种模式"
    "NONE - 保持在当前线程执行"
    "DISPATCH - 不阻塞地发布到主线程"
    "BLOCK - 发布到主线程并等待结果"
    "EXCEPTION - 抛出异常"
  ]
  async-catcher.dump.comment = "是否在 debug 日志中打印堆栈信息"
  compatibility {
    symlink-world.comment = [
      "为模组的维度创建符号链接"
      "推荐启用以增强插件交互兼容性"
      "变更此设置会导致模组世界名称变化，可能造成依赖世界名称的插件数据丢失"
      "参见 https://github.com/IzzelAliz/Arclight/wiki/World-Symlink"
    ]
    extra-logic-worlds.comment = [
      "额外运行逻辑的维度类名"
      "如果有模组世界/功能运行不正常，尝试在日志中搜索和 [EXT_LOGIC] 有关的对应类名并添加"
    ]
    forward-permission.comment = [
      "true - 将 Forge 权限查询请求转发至 Bukkit"
      "false - 不启用权限转发"
      "reverse - 将 Bukkit 玩家权限查询请求转发至 Forge"
    ]
    valid-username-regex.comment = [
      "用户名合法检查正则表达式，留空为使用原版检查"
      "如果需要允许中文字符可以使用"
      "valid-username-regex = \"^[ -~\\p{sc=Han}]{1,16}$\""
      "如果允许任何用户名可以使用"
      "valid-username-regex = \".+\""
    ]
    lenient-item-tag-match.comment = [
      "允许空 NBT 标签的物品和没有 NBT 标签的物品堆叠"
    ]
    isolate-plugin-class-loaders.comment = [
      "非法访问指一个插件加载了自身未声明依赖（depend）或软依赖（soft-depend）的其他插件中的类。"
      "当设置了某个包名时，将不会对以此包名为前缀的类尝试任何非法访问。"
      "这在发生类加载问题时尤其有用。"
      "请注意：这可能导致依赖非法访问的插件失效。"
    ]
    isolate-adventure-from-modloader.comment = [
      "阻止插件从你的模组加载器加载Kyori Adventure。"
      "这只是一个兼容性选项，且仅现在存在。未来会以更完善的机制取缔，"
    ]
  }
}
