comments {
  _v.comment = [
    "Repositorio: https://github.com/IzzelAliz/Arclight"
    "Rastredor de asuntos y errores: https://github.com/IzzelAliz/Arclight/issues"
    ""
    ""
    "Versión de la configuración, no editar."
  ]
  locale.comment = "Idioma/ajustes I18n"
  optimization {
    comment = [
      "Ajustes de optimización (Paper-lite / Spigot)"
      "En stacks híbridos, Starlight / ModernFix / Krypton ya cubren gran parte del Paper moderno (luz, general, red)."
      "También: spigot.yml (rangos de activación/seguimiento, hoppers, merge) y bukkit.yml (spawn-limits, ticks-per.*)."
    ]
    cache-plugin-class.comment = "Cachea clases de plugins remapeadas para acelerar la carga"
    disable-data-fixer.comment = [
      "Desactiva el sistema DataFixerUpper el cual es usado para actualización de datos de nivel (level data upgrading)"
      "Se espera que esto acelere la puesta en marcha y la carga del mundo del servidor, y reducir el uso de memoria en 80-200mb"
      "Arclight y sus desarrolladores no se hacen responsables de la pérdida o corrupción de la información"
      "¡NO USAR EN PRODUCCIÓN!"
    ]
    max-entity-collisions.comment = [
      "Máximo de colisiones de empuje entidad-entidad por living entity y tick (estilo Spigot/Paper)"
      "Por defecto 8 como Spigot clásico; <= 0 desactiva el empuje entre entidades"
      "Respeta LivingEntity#setCollidable y las excepciones de colisión de Bukkit"
    ]
    goal-selector-update-interval.comment = [
      "Intervalo en ticks para actualizar el selector de objetivos (goal selector)"
      "Valores más grandes gastan menos recursos"
      "Hace que los mobs cambien sus objetivos menos a menudo"
    ]
    quiet-startup.comment = [
      "Compacta las líneas INFO de cada registro al arrancar en un único resumen"
      "Los conteos detallados siguen disponibles en DEBUG"
    ]
    spawn {
      comment = [
        "Presupuesto de generación natural de mobs (hilo principal). Protege el TPS bajo carga."
        "Limita intentos de spawnForChunk por tick; no sustituye spawn-limits de bukkit.yml."
        "Si las cuevas se sienten vacías: difficulty no Peaceful, gamerule doMobSpawning true,"
        "spigot.yml mob-spawn-range >= 6 (nunca 0 con use-mob-spawn-range), prueba A/B enabled=false."
        "Los spawners de bloque no entran en el presupuesto. No divide mundos al estilo Folia."
      ]
      enabled.comment = "Activa el presupuesto de EntityGenerationManager"
      skip-when-mspt-above.comment = "Omite spawnForChunk natural este tick si el MSPT medio es mayor o igual"
      max-chunks-per-tick.comment = "Máximo de chunks que pueden ejecutar spawnForChunk por mundo y tick (default 64)"
      max-ms-per-tick.comment = "Presupuesto suave en ms solo del trabajo spawnForChunk (excluye prep de tickChunks)"
      per-player-mob-spawns.comment = [
        "Paper-lite: LocalMobCapCalculator para densidad local, más spawn-limits de bukkit.yml como techo del mundo"
        "Evita que una granja consuma el tope global y sigue respetando límites altos del admin"
      ]
      use-mob-spawn-range.comment = "Respeta mob-spawn-range de spigot.yml al elegir chunks (0 = sin spawn natural)"
      relaxed-when-players-at-most.comment = "Con esta cantidad de jugadores o menos y MSPT bajo, no aplica max-chunks/max-ms (sí respeta skip-when-mspt-above y mob-spawn-range)"
      relaxed-when-mspt-below.comment = "El MSPT debe estar por debajo de este valor para activar el presupuesto relaxed en solo/pocos jugadores"
      local-mob-cap-scale.comment = [
        "Multiplica el tope local de LocalMobCapCalculator por categoría (monsters ~70 con 1.0)"
        "spawn-limits de bukkit.yml sigue siendo el techo del mundo; esto solo cambia la densidad local"
        "Ejemplo: 3.0 ≈ 210 monsters locales. Edita el arclight.conf vivo (el JAR no sobrescribe)"
      ]
      local-mob-cap.comment = [
        "Topes locales absolutos por categoría; -1 = usar vanillaMax * local-mob-cap-scale"
        "Ejemplo: monster = 200 limita hostiles locales a 200 sin importar el scale"
      ]
    }
    chunks {
      comment = [
        "Presupuesto de carga / generación / envío de chunks en el hilo principal. Protege el TPS al explorar o teletransportarse."
        "Difiere en suave scheduleChunkGeneration no bloqueante bajo presión; getChunk síncrono siempre hace flush antes de esperar."
        "NUNCA limita MainThreadExecutor.pollTask (eso provocó deadlocks de ServerWatchdog)."
        "Ajusta también view-distance y simulation-distance en spigot.yml."
        "Evita keep-spawn-loaded en mundos Multiverse vacíos. Usa /chunkcap para ver colas."
      ]
      enabled.comment = "Activa el presupuesto de ChunkWorkloadManager"
      skip-gen-when-mspt-above.comment = "Difiere schedules de worldgen este tick si el MSPT medio es mayor o igual (getChunk síncrono igual fuerza progreso)"
      max-chunk-loads-per-tick.comment = "Máximo de promociones load/ligeras no bloqueantes por tick (la ruta síncrona ignora el tope)"
      max-chunk-gens-per-tick.comment = "Máximo de promociones de worldgen no bloqueantes por tick (la ruta síncrona ignora el tope)"
      max-chunk-sends-per-tick.comment = "Máximo de paquetes chunk+luz enviados a jugadores por tick (suaviza flood tras TP/join)"
      max-ms-per-tick.comment = "Presupuesto suave en ms para trabajo de chunks presupuestado por tick de servidor"
    }
  }
  async-catcher.comment = [
    "Ajustes relacionados con receptor asíncromo (Async Catcher)"
    "Hay cuatro modos, y BLOCK (bloqueo) es el recomendado"
    "NONE - No hacer nada"
    "DISPATCH - Enviar acciones sin interrumpir el hilo principal (main thread)"
    "BLOCK - Ejecutar en el hilo principal (main thread) y esperar los resultados"
    "EXCEPTION - Generar un error"
  ]
  async-catcher.dump.comment = "Generar un volcado de información (stack trace) en debug.log"
  compatibility {
    symlink-world.comment = [
      "Crear enlaces de símbolos a las dimensiones de mods para que se ajuste al formato de Bukkit"
      "Activando esto puede mejorar la compatibilidad entre plugins"
      "Cambiar esto en servidores en producción causará cambios a nombres de mundos modificados (mod world names)"
      "  y causará pérdida de información en plugins que dependan en los nombres de mundos"
      "Lee https://github.com/IzzelAliz/Arclight/wiki/World-Symlink para más detalles"
    ]
    extra-logic-worlds.comment = [
      "Lógica de los mundos adicionales en ejecución"
      "Si algún mod no funciona correctamente, intenta buscar en los logs los nombres de las clases relacionados con [EXT_LOGIC] y añádelos aquí"
    ]
  }
}
